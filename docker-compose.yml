services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webhook_db
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_user -d webhook_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: webhook-project-app:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npm", "run", "db:migrate"]
    environment:
      DATABASE_URL: postgresql://webhook_user:webhook_pass@db:5432/webhook_db
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    image: webhook-project-app:local
    environment:
      DATABASE_URL: postgresql://webhook_user:webhook_pass@db:5432/webhook_db
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    image: webhook-project-app:local
    command: ["node", "dist/workerEntry.js"]
    environment:
      DATABASE_URL: postgresql://webhook_user:webhook_pass@db:5432/webhook_db
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
